repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: ["src", "tests"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        name: mypy (src and tests)
        args:
          - --config-file
          - mypy.ini
          - --explicit-package-bases
        files: ^(src|tests)/
        additional_dependencies:
          # Runtime deps needed for imports
          - fastapi
          - starlette
          - pydantic==2.12.0
          - pydantic-settings==2.12.0
          - prometheus-client
          # Testing deps required when mypy checks test files under 'tests/'
          - pytest
          - pytest-asyncio

  - repo: local
    hooks:
      - id: hadolint
        name: hadolint (Dockerfile)
        entry: hadolint ./Dockerfile
        language: system
        files: ^Dockerfile$

  - repo: local
    hooks:
      - id: pytest
        name: pytest (tests)
        entry: pytest -q tests
        language: system
        pass_filenames: false
        stages: [commit]