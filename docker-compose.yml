services:
  seg-init:
    image: busybox:latest
    command: >
      sh -c "
        set -e &&
        umask 022 &&
        mkdir -p ${SEG_ROOT_DIR} &&
        chown -R ${NON_ROOT_UID}:${NON_ROOT_GID} ${SEG_ROOT_DIR} &&
        find ${SEG_ROOT_DIR} -type d -print0 | xargs -0 -r chmod 755 &&
        find ${SEG_ROOT_DIR} -type f -print0 | xargs -0 -r chmod 644
      "
    volumes:
      - seg_data:${SEG_ROOT_DIR}
    restart: "no"

  seg:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NON_ROOT_USER: ${NON_ROOT_USER}
        NON_ROOT_GROUP: ${NON_ROOT_GROUP}
        NON_ROOT_UID: ${NON_ROOT_UID}
        NON_ROOT_GID: ${NON_ROOT_GID}
        SEG_APP_VERSION: ${SEG_APP_VERSION}
    restart: unless-stopped
    env_file: .env
    secrets:
      - seg_api_token
    volumes:
      - seg_data:${SEG_ROOT_DIR}
    depends_on:
      seg-init:
        condition: service_completed_successfully
    networks:
      - default_network

networks:
  default_network:
    external: true
    name: ${SHARED_DOCKER_NETWORK}

secrets:
  seg_api_token:
    file: ./secrets/seg_api_token.txt

volumes:
  seg_data:
    name: ${COMPOSE_PROJECT_NAME}_seg-data
