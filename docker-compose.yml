services:
  seg:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NON_ROOT_USER: ${NON_ROOT_USER}
        NON_ROOT_GROUP: ${NON_ROOT_GROUP}
        NON_ROOT_UID: ${NON_ROOT_UID}
        NON_ROOT_GID: ${NON_ROOT_GID}
        SEG_APP_VERSION: ${SEG_APP_VERSION}
    restart: unless-stopped
    env_file: .env
    secrets:
      - seg_api_token
    volumes:
      - seg_data:/var/lib/seg
    networks:
      - default_network

networks:
  default_network:
    external: true
    name: ${SHARED_DOCKER_NETWORK}

secrets:
  seg_api_token:
    file: ./secrets/seg_api_token.txt

volumes:
  seg_data:
    name: ${COMPOSE_PROJECT_NAME}_data
