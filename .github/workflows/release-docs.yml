name: Release Docs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # Validate strict semver
      # -------------------------
      - name: Validate strict semver tag (vX.Y.Z)
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format. Expected vX.Y.Z"
            exit 1
          fi

      # -------------------------
      # Python setup
      # -------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install openapi-spec-validator

      # -------------------------
      # Export & validate OpenAPI
      # -------------------------
      - name: Export OpenAPI schema
        run: python scripts/export_openapi.py

      - name: Validate OpenAPI schema
        run: python -m openapi_spec_validator docs/api-docs/output/openapi.json

      # -------------------------
      # Node setup
      # -------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Swagger UI
        run: |
          npm init -y
          npm install swagger-ui-dist@5.17.14

      # -------------------------
      # Build site locally
      # -------------------------
      - name: Build versioned docs site
        run: |
          export RELEASE_VERSION=${GITHUB_REF_NAME}
          python scripts/build_docs_site.py

      # -------------------------
      # Deploy to gh-pages
      # -------------------------
      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          cp -r site/* .

          git add .
          git commit -m "docs: release ${GITHUB_REF_NAME}" || echo "No changes to commit"

          git push origin gh-pages
