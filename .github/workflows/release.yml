name: Release

on:
  push:
    tags:
      - "v*" # trigger only on version tags like v1.2.3
  workflow_dispatch:

env:
  IMAGE_NAME: seg

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch full history for accurate semver parsing

      - uses: docker/setup-buildx-action@v3 # enable BuildKit

      - name: Validate strict semver tag (vX.Y.Z)
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format. Expected vX.Y.Z"
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (semver + sha tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      - name: Build image locally (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          load: true # load into local daemon for Trivy scan

      - name: Scan image before publish (block on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push semver + sha tags (only if scan passed)
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | while read -r tag; do
            [ -n "$tag" ] || continue
            docker push "$tag"
          done

      - name: Check if tag is on main HEAD
        id: check_main
        run: |
          git fetch origin main --depth=1
          MAIN_HEAD=$(git rev-parse origin/main)

          if [ "$GITHUB_SHA" = "$MAIN_HEAD" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

      - name: Tag and push latest (only if tag is in main)
        if: steps.check_main.outputs.is_main == 'true'
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
                     ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
