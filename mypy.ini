[mypy]
python_version = 3.12

mypy_path = src

# Explicit files to type-check when invoking `mypy` without positional args.
files = src tests

# Whether the analyzer should error on imports it can't resolve. In CI we
# prefer to be strict, but in developers' editors this can be noisy. Keep
# False in CI if you want missing import failures; here we default to False
# so the pydantic plugin can operate reliably.
ignore_missing_imports = False

# General strictness toggles
strict = False
warn_unused_ignores = True
warn_unused_configs = True

# ----------------------------------------------------------------------
# Third-party modules without type stubs
# ----------------------------------------------------------------------
# python-magic does not provide type hints or .pyi stubs.
# We intentionally ignore missing imports for this module only
# to keep strict type checking enabled project-wide.
[mypy-magic]
ignore_missing_imports = True
