[mypy]
python_version = 3.12
# Enable the pydantic mypy plugin so mypy understands BaseModel/BaseSettings
plugins = pydantic.mypy

# Whether the analyzer should error on imports it can't resolve. In CI we
# prefer to be strict, but in developers' editors this can be noisy. Keep
# False in CI if you want missing import failures; here we default to False
# so the pydantic plugin can operate reliably.
ignore_missing_imports = False

# General strictness toggles
strict = False
warn_unused_ignores = True
warn_unused_configs = True

# Add per-module overrides below if necessary, for example to relax checks on
# third-party wrapper modules.
